# 示例配置文件 - 本地模式
# 用于本地部署的配置示例

api:
  base_url: "https://api.siliconflow.cn/v1"
  model: "glm-4.6v"
  # API Key 将从环境变量 SILICONFLOW_API_KEY 读取

execution:
  mode: "local"  # 本地模式
  timeout: 300   # 命令执行超时时间（秒）

security:
  enable_secondary_confirmation: true
  max_command_timeout: 300

