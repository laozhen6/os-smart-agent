# 操作系统智能代理配置文件
#请输入你的api相关配置
api:
  base_url: "   "
  model: "   "
  api_key: "   "

execution:
  mode: "ssh"
  timeout: 300
#请输入你的ssh用户信息
  ssh:
    host: "  "
    port:   
    username: "  "
    password: "  "
    # 更推荐改用密钥登录。若使用密钥，请删除 password 并启用下面这一行：

security:
  enable_secondary_confirmation: true
  max_command_timeout: 300
  risk_operations:
    high:
      - "删除系统目录"
      - "删除系统文件"
      - "格式化磁盘"
      - "修改关键配置"
    medium:
      - "删除文件"
      - "修改配置"
      - "用户权限变更"
